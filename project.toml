# project.toml — persists pack CLI configuration so you don't repeat flags each build.
# Usage: pack build my-app --buildpack paketobuildpacks/azul-zulu \
#                          --buildpack paketobuildpacks/java \
#                          --builder paketobuildpacks/builder:base

[[build.env]]
  name  = "BP_JVM_VERSION"
  value = "21"

[[build.env]]
  name  = "BP_JVM_TYPE"
  value = "JRE"
